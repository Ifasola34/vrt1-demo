name: CI

on:
  push:
    branches: [main]

jobs:
  smoke:
    name: full-chain smoke py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the rest of the matrix if one Python version fails.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (pulls each ecosystem repo from its main branch)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run end-to-end smoke test
        run: pytest -q

      - name: Run demo CLI (sanity)
        run: vrt1-demo
